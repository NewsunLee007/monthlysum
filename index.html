<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>月度自评系统 - 内部访问验证</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #0f172a;
        --danger: #dc2626;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }
      .card-wide {
        max-width: 920px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 26px;
        line-height: 1.2;
      }
      p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }
      label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        height: 44px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0 12px;
        font-size: 15px;
        outline: none;
      }
      input:focus {
        border-color: #334155;
      }
      button {
        width: 100%;
        height: 44px;
        border: none;
        border-radius: 10px;
        background: var(--accent);
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        margin-top: 14px;
        cursor: pointer;
      }
      .btn-secondary {
        background: #334155;
      }
      .message {
        margin-top: 12px;
        font-size: 13px;
        min-height: 18px;
      }
      .error {
        color: var(--danger);
      }
      .ok {
        color: #15803d;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="login-view" class="card">
      <h1>内部访问验证</h1>
      <p>请输入密码后进入程序</p>
      <label for="password">访问密码</label>
      <input id="password" type="password" placeholder="请输入访问密码" />
      <button id="submit">进入系统</button>
      <div id="message" class="message"></div>
    </div>
    <div id="system-view" class="card card-wide hidden">
      <h1>月度自评生成器</h1>
      <p>已通过密码验证，欢迎使用内部系统</p>
      <div style="border:1px solid var(--border);border-radius:14px;padding:18px;background:#f8fafc;">
        <div style="font-size:15px;font-weight:600;margin-bottom:8px;">主程序入口已开启</div>
        <div style="font-size:14px;line-height:1.6;color:var(--muted);">
          当前页面已完成登录切换。若需进入完整 Next.js 主程序，请使用支持 Next 服务端运行的部署环境。
        </div>
      </div>
      <button id="logout" class="btn-secondary">退出登录</button>
    </div>
    <script>
      const PASSWORD = "admin123";
      const STORAGE_KEY = "monthly_summary_access_granted";
      const submit = document.getElementById("submit");
      const logout = document.getElementById("logout");
      const password = document.getElementById("password");
      const message = document.getElementById("message");
      const loginView = document.getElementById("login-view");
      const systemView = document.getElementById("system-view");

      function setMessage(text, isError) {
        message.textContent = text;
        message.className = "message " + (isError ? "error" : "ok");
      }

      function enterSystem() {
        localStorage.setItem(STORAGE_KEY, "1");
        loginView.classList.add("hidden");
        systemView.classList.remove("hidden");
      }

      if (localStorage.getItem(STORAGE_KEY) === "1") {
        enterSystem();
      }

      function verify() {
        if (password.value === PASSWORD) {
          enterSystem();
          return;
        }
        setMessage("密码错误，请重试。", true);
      }

      submit.addEventListener("click", verify);
      password.addEventListener("keydown", (e) => {
        if (e.key === "Enter") verify();
      });
      logout.addEventListener("click", () => {
        localStorage.removeItem(STORAGE_KEY);
        systemView.classList.add("hidden");
        loginView.classList.remove("hidden");
        password.value = "";
        setMessage("", true);
      });
    </script>
  </body>
  </html>
